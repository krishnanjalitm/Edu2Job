<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu2Job | Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .result-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-box {
            width: 100px;
            height: 100px;
            background: #f1f2f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            color: #4834d4;
        }
        .prediction-text {
            color: #2f3542;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .role-badge {
            display: inline-block;
            background: #4834d4;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(72, 52, 212, 0.4);
            margin-bottom: 30px;
        }
        .back-btn {
            background: transparent;
            color: #4834d4;
            border: 2px solid #4834d4;
            padding: 10px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #4834d4;
            color: white;
        }
    </style>
</head>
<body>

<div class="result-card">
    <div class="icon-box">
        🎓
    </div>
    <h3 class="prediction-text">Based on our AI Analysis, your recommended career path is:</h3>
    
    <div class="role-badge">
        {{ prediction_text.split(': ')[1] }}
    </div>

    <p class="text-muted mb-4">Keep learning and building projects to excel in this field!</p>
    
    <div class="mt-4">
        <a href="/" class="back-btn">Try Another Analysis</a><br>

    </div>
    <div class="mt-4">
        
        <a href="/student_dashboard" class="back-btn">Go to Student Dashboard</a>
    </div>
</div>

</body>
</html>
