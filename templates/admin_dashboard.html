<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu2Job | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .sidebar { background: #2c3e50; min-height: 100vh; color: white; padding: 20px; }
        .admin-card { border-radius: 15px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .table thead { background: #4834d4; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="mb-5"><i class="bi bi-person-badge me-2"></i>Admin Panel</h4>
            <a href="/admin_dashboard" class="text-white d-block mb-3 text-decoration-none"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="/logout" class="text-danger d-block mt-5 text-decoration-none"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
        </div>

        <div class="col-md-10 p-4">
            <h2 class="mb-4">Student Management</h2>
            
            <div class="card admin-card">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student Name</th>
                                <th>Resume File</th>
                                <th>Actions</th>
                                <th>Prediction Result</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for user in users %}
                            <tr>
                                <td>{{ user[0] }}</td>
                                <td><strong>{{ user[1] }}</strong></td>
                                <td>{{ user[3] if user[3] else 'Not Predicted' }}</td>
                                <td>
                                    {% if user[2] %}
                                    <a href="{{ user[2] }}" class="btn btn-sm btn-outline-primary" target="_blank">
                                        <i class="bi bi-eye me-1"></i> View Resume
                                    </a>
                                    {% else %}
                                    <span class="text-muted">No File</span>
                                    {% endif %}
                                </td>
                                <td>
                                    <a href="/delete_user/{{ user[0] }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
