<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu2Job | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #e4c1f9 0%, #3a0ca3 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 850px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            overflow: hidden;
        }
        .form-section { padding: 40px; }
        .image-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }
        /* this style help to see the input field */
        .form-control {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
            border-radius: 10px !important;
            padding: 12px 15px !important;
            margin-bottom: 20px;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }
        .register-btn {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            width: 100%;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="row g-0">
        <div class="col-md-5 d-none d-md-block">
            <div class="image-section">
                <i class="bi bi-person-plus" style="font-size: 80px;"></i>
                <h3 class="mt-3">Create Account</h3>
                <p class="opacity-75">Join Edu2Job and explore your career possibilities.</p>
            </div>
        </div>
        <div class="col-md-7 form-section">
            <h2 class="mb-4">Sign Up</h2>
            <form action="/register_process" method="post" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label class="form-label">User Name</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Upload Resume (PDF)</label>
                    <input type="file" name="resume" class="form-control" accept=".pdf" required>
                </div>

                <button type="submit" class="register-btn">Register Now</button>
            </form>
            <div class="mt-3 text-center">
                Already have an account? <a href="/" style="color: #d3b3f8; text-decoration: none;">Login Here</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
