<!DOCTYPE html>
<html>
<head>
    <title>Edu2Job Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; }
    </style>
</head>
<body>
    <h2>Edu2Job: Career Prediction</h2>
    <form action="/predict" method="post">
        <div class="form-group">
            <label>CGPA:</label>
            <input type="number" step="0.01" name="cgpa" required>
        </div>
        <div class="form-group">
            <label>Python:</label>
            <select name="python"><option>Yes</option><option>No</option></select>
        </div>
        <div class="form-group">
            <label>Java:</label>
            <select name="java"><option>Yes</option><option>No</option></select>
        </div>
        <div class="form-group">
            <label>SQL:</label>
            <select name="sql"><option>Yes</option><option>No</option></select>
        </div>
        <div class="form-group">
            <label>Machine Learning:</label>
            <select name="ml"><option>Yes</option><option>No</option></select>
        </div>
        <div class="form-group">
            <label>Web Development:</label>
            <select name="webdev"><option>Yes</option><option>No</option></select>
        </div>
        <div class="form-group">
            <label>Communication:</label>
            <select name="comm"><option value="2">High</option><option value="1">Medium</option><option value="0">Low</option></select>
        </div>
        <div class="form-group">
            <label>Internship:</label>
            <select name="internship"><option>Yes</option><option>No</option></select>
        </div>
        <div class="form-group">
            <label>Projects Count:</label>
            <input type="number" name="projects" required>
        </div>
        <div class="form-group">
            <label>Certifications:</label>
            <input type="number" name="certs" required>
        </div>
        <button type="submit">Predict Job Role</button>
    </form>
</body>
</html>
